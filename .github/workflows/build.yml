name: build
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        release:
          - 24.10.5
        arch:
          - mediatek-filogic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.release }}
          PACKAGES: mollysocket
          NO_REFRESH_CHECK: true
          NO_SHFMT_CHECK: true
          # NO_DEFAULT_FEEDS: true
          EXTRA_FEEDS: >-
            src-git|packages|https://github.com/openwrt/packages.git^0816e4806a3c5392345377e208cbe0280e259bf5
          # src-git|luci|https://github.com/openwrt/luci.git^75e41cba5160281b2d1dca922719efef29f7ffd8
          # src-git|routing|https://github.com/openwrt/routing.git^3eb59e9471858c83891979793f1dd29cca156919
          # src-git|telephony|https://github.com/openwrt/telephony.git^2a4541d46199ac96fac214d02c908402831c4dc6
          V: s

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: mollysocket-${{ matrix.arch }}_${{ matrix.release }}
          path: bin/packages/**/mollysocket*.ipk
