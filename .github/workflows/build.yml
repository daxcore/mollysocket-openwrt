name: build
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        release:
          - 24.10.5
        arch:
          - mediatek-filogic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.release }}
          PACKAGES: mollysocket
          NO_REFRESH_CHECK: true
          NO_SHFMT_CHECK: true
          NO_DEFAULT_FEEDS: true
          EXTRA_FEEDS: >-
            src-git|packages|https://github.com/openwrt/packages.git;openwrt-24.10
            src-git|luci|https://github.com/openwrt/luci.git;openwrt-24.10
            src-git|routing|https://github.com/openwrt/routing.git;openwrt-24.10
            src-git|telephony|https://github.com/openwrt/telephony.git;openwrt-24.10
          V: s

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: mollysocket-${{ matrix.arch }}_${{ matrix.release }}
          path: bin/packages/**/mollysocket*.ipk
